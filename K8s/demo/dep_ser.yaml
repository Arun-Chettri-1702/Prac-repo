apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name : nginx
        image: nginx:1.14.2
        # env:
        #   - name: APP_MESSAGE
        #     value: "HELLO FROM DEPLOYMENT YAML FILE"
        #   - name: DB_PASSWORD
        #     value: "cGFzc3dvcmQ=" # base64 encoded value of password
        env:
          - name: APP_MESSAGE
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: APP_MESSAGE
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DB_PASSWORD

        ports:
        - containerPort: 80

---
apiVersion: v1
kind : Service
metadata:
  name: nginx-service
spec: 
  selector:
    app: nginx
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32000
      protocol: TCP