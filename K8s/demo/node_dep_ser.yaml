apiVersion: apps/v1
kind: Deployment
metadata:
  name: arun-node
  labels:
    app: arun-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arun-node
  template:
    metadata:
      labels:
        app: arun-node
    spec:
      containers:
      - name: arun-node
        image: arunchettri/hello-node:latest
        env:
          - name: APP_MESSAGE
            valueFrom:
              configMapKeyRef:
                name: node-configmap
                key: APP_MESSAGE
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: node-configmap
                key: PORT
        ports:
          - containerPort: 3000
  
---

apiVersion: v1
kind: Service
metadata:
  name: arun-node
spec:
  selector: 
    app: arun-node
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32001
      protocol: TCP
    