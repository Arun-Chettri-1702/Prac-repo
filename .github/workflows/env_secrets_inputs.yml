name: DEMO CI ENV SECRETS INPUTS

on:
    # push:
    workflow_dispatch:

# global level env -> available to all jobs or workflow level env
# env:
#     APP_ENV: demo
#     DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
    build:
        runs-on: ubuntu-latest
        
        # job level env -> available to all steps in this job
        env:
            APP_ENV: demo_new
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

        steps:
            -   name: Say Hello
                run: echo "Hello from the second workflow!"
            -   name: Install
                # env:
                #     APP_ENV: demo_new
                #     DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                run: echo "Environment $APP_ENV using $DB_PASSWORD on job level env"
            
            -   name: create demo file
                run: |
                    echo "Hello from CI pipeline" > demo.txt
                    echo "File Created successfully"    

            -   name: upload Demo
                uses: actions/upload-artifact@v4    
                with: 
                    name: build-artifact-demo
                    path: .
    
    test:
        runs-on: ubuntu-latest
        needs: build  # -> wait until build job is completed successfully before starting this job
        
        steps:
            -   name: Test Job
                run: echo "Test Job dependent on build job i.e must run after build job "
            
